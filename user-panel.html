<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard | Meheli Artwork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 md:min-h-screen glass border-r border-slate-800 p-6 flex flex-col">
        <h2 class="text-xl font-bold gold-gradient mb-10">USER PANEL</h2>
        
        <nav class="flex-1 space-y-4">
            <button onclick="showTab('orders')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center space-x-3 transition-all" id="btn-orders">
                <i data-lucide="shopping-bag"></i> <span>My Purchases</span>
            </button>
            <button onclick="showTab('chat')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center space-x-3 transition-all" id="btn-chat">
                <i data-lucide="message-circle"></i> <span>Chat with Chamu</span>
            </button>
            <a href="shop.html" class="block w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center space-x-3 transition-all">
                <i data-lucide="shopping-cart"></i> <span>Back to Shop</span>
            </a>
        </nav>

        <button onclick="logout()" class="p-3 text-red-400 flex items-center space-x-3 hover:bg-red-500/10 rounded-lg transition-all mt-10">
            <i data-lucide="log-out"></i> <span>Logout</span>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-10">
        
        <!-- Orders Tab -->
        <section id="tab-orders" class="tab-content">
            <h1 class="text-3xl font-bold mb-8">My Artwork Collection</h1>
            <div id="user-orders" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- User orders populated by JS -->
            </div>
        </section>

        <!-- Chat Tab -->
        <section id="tab-chat" class="tab-content hidden">
            <h1 class="text-3xl font-bold mb-8">Message Designer</h1>
            <div class="glass rounded-2xl flex flex-col h-[70vh] max-w-2xl mx-auto shadow-2xl border border-slate-800">
                <div class="p-4 border-b border-slate-700 flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full gold-bg-gradient flex items-center justify-center font-bold text-slate-900">C</div>
                    <div>
                        <p class="font-bold">Chamu (Admin)</p>
                        <p class="text-xs text-green-500">Online</p>
                    </div>
                </div>
                <div class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-900/30" id="chat-messages">
                    <!-- Messages populated by JS -->
                </div>
                <div class="p-4 bg-slate-800/50 flex space-x-2">
                    <input type="text" id="chat-input" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 focus:ring-2 focus:ring-amber-500 focus:outline-none" placeholder="Ask about your design...">
                    <button onclick="sendChatMessage()" class="btn-primary px-6">Send</button>
                </div>
            </div>
        </section>

    </main>

    <script src="js/db.js"></script>
    <script>
        lucide.createIcons();
        const user = DB.getCurrentUser();

        // Security Check
        if (!user) {
            window.location.href = 'auth.html';
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            
            if (tab === 'orders') renderUserOrders();
            if (tab === 'chat') renderMessages();
        }

        function renderUserOrders() {
            const container = document.getElementById('user-orders');
            const orders = DB.getOrders().filter(o => o.userId === user.id);
            const artworks = DB.getArtworks();

            if (orders.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-500">You haven't bought any graphics yet.</div>`;
                return;
            }

            container.innerHTML = '';
            orders.forEach(order => {
                const art = artworks.find(a => a.id === order.artId);
                if (!art) return;
                container.innerHTML += `
                    <div class="glass p-4 rounded-2xl border border-slate-800 animate-fade-in">
                        <img src="${art.image}" class="w-full h-48 object-cover rounded-xl mb-4">
                        <h3 class="text-xl font-bold">${art.title}</h3>
                        <p class="text-slate-400 text-sm mb-2">Purchased on: ${order.date}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-amber-500 font-bold">Rs. ${order.price}</span>
                            <span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded">Secured</span>
                        </div>
                    </div>
                `;
            });
        }

        // Chat Logic
        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            DB.getMessages().filter(m => m.from === user.id || m.to === user.id).forEach(m => {
                const isMe = m.from === user.id;
                container.innerHTML += `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                        <div class="${isMe ? 'bg-amber-500 text-slate-900' : 'bg-slate-800 text-slate-100'} p-3 px-4 rounded-2xl max-w-[85%] shadow-lg">
                            <p>${m.text}</p>
                        </div>
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (text) {
                DB.sendMessage({ from: user.id, to: 'admin', text, time: Date.now() });
                input.value = '';
                renderMessages();
            }
        }

        function logout() {
            DB.logout();
            window.location.href = 'index.html';
        }

        showTab('orders');
        // Refresh messages every 3 seconds
        setInterval(() => {
            if (!document.getElementById('tab-chat').classList.contains('hidden')) {
                renderMessages();
            }
        }, 3000);
    </script>
</body>
</html>
